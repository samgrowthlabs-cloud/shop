<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Categorias — Admin SHOPLAB</title><link rel="stylesheet" href="../assets/css/admin.css"></head><body data-admin-page="categories"><div id="message" class="admin-message"></div><div class="modal" id="category-modal"><div class="modal-card"><div class="modal-head"><h2>Categoria</h2><button class="icon-btn" type="button" onclick="this.closest('.modal').classList.remove('open')">×</button></div><form id="category-form" class="form-grid" style="margin-top:20px"><input id="category-id" type="hidden"><div class="form-field"><label>Nome</label><input id="category-name" required maxlength="100"></div><div class="form-field"><label>Slug</label><input id="category-slug" required maxlength="100" placeholder="exemplo-de-categoria"></div><div class="form-field"><label>Ícone</label><input id="category-icon" maxlength="8"></div><div class="form-field"><label><input id="category-active" type="checkbox" checked> Categoria ativa</label></div><div class="form-field full"><label>Descrição</label><textarea id="category-description" rows="4" maxlength="1000"></textarea></div><button class="btn primary">Salvar</button></form></div></div><script type="module" src="../assets/js/admin.js"></script></body></html>
